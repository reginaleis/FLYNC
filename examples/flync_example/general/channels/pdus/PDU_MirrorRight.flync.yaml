name: PDU_MirrorRight
type: standard
length: 2
description: Right exterior mirror horizontal and vertical position.

signals:
  - bit_position: 0
    endianness: LE

    signal:
      name: MirrorRightHorizontal
      description: Right exterior mirror horizontal position.
      bit_length: 8
      data_type: uint8
      factor: 1.0
      offset: -90.0
      lower_limit: -90.0
      upper_limit: 90.0
      unit: deg
      value_descriptions:
        - value: 255
          description: Position_Unknown
  - bit_position: 8
    endianness: LE

    signal:
      name: MirrorRightVertical
      description: Right exterior mirror vertical position.
      bit_length: 8
      data_type: uint8
      factor: 1.0
      offset: -30.0
      lower_limit: -30.0
      upper_limit: 30.0
      unit: deg
      value_descriptions:
        - value: 255
          description: Position_Unknown
