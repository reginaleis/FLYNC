name: PDU_TransmissionStatus
type: multiplexed
length: 8
description: Transmission status, multiplexed on GearInfoMux selector.

selector_signal:
  bit_position: 0
  endianness: LE
  signal:
    name: GearInfoMux
    description: Multiplexer selector for TransmissionStatus PDU.
    bit_length: 4
    data_type: uint8

mux_groups:
  - selector_value: 0
    signals:
      - bit_position: 8
        endianness: LE

        signal:
          name: CurrentGear
          description: Currently engaged gear.
          bit_length: 8
          data_type: uint8
          value_descriptions:
            - value: 0
              description: Park
            - value: 1
              description: Reverse
            - value: 2
              description: Neutral
            - value: 3
              description: Drive_D1
            - value: 4
              description: Drive_D2
            - value: 5
              description: Drive_D3
            - value: 6
              description: Drive_D4
      - bit_position: 16
        endianness: LE

        signal:
          name: GearShiftMode
          description: Automatic / manual / sport shift mode.
          bit_length: 4
          data_type: uint8
          value_descriptions:
            - value: 0
              description: Automatic
            - value: 1
              description: Manual
            - value: 2
              description: Sport
  - selector_value: 1
    signals:
      - bit_position: 8
        endianness: LE

        signal:
          name: TorqueConverterSlipSpeed
          description: Slip speed of the torque converter.
          bit_length: 16
          data_type: uint16
          factor: 0.1
          offset: 0.0
          unit: rpm
      - bit_position: 24
        endianness: LE

        signal:
          name: TorqueConverterLockup
          description: Torque converter lock-up clutch state.
          bit_length: 2
          data_type: uint8
          value_descriptions:
            - value: 0
              description: Open
            - value: 1
              description: Slipping
            - value: 2
              description: Locked
            - value: 3
              description: Error
